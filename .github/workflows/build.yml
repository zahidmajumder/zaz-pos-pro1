name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Extract
        run: tar -xf zaz-pos-pro.tar

      - name: Install dependencies
        run: |
          cd zaz-pos-pro
          npm install
          npm install electron-builder

      - name: Build EXE
        run: |
          cd zaz-pos-pro
          npx electron-builder --win

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: zaz-pos-pro/dist/
