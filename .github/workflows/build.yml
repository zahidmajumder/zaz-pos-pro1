name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Extract
        run: tar -xf *.tar

      - name: Install
        run: npm install
        working-directory: zaz-pos-pro

      - name: Build
        run: npx electron-builder --win
        working-directory: zaz-pos-pro

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: zaz-pos-pro/dist/
